spring.application.name=LaudryGo

server.port=${PORT:8085}


# Database Configuration
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Bat buoc Spring HTTP tra ve UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.pool-name=HikariPool-HRM
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# Security JWT Configuration
security.jwt.issuer=
security.jwt.access-token-ttl=3600
security.jwt.refresh-token-ttl=86400
security.jwt.kms-key-id=alias/hrm-jwt-key

# AWS Configuration
aws.region=ap-southeast-1
aws.s3.bucket-name=
aws.sqs.queue-url=
aws.secrets.jwt-secret-name=

#AWS
aws.access-key-id=
aws.secret-access-key=

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# OpenTelemetry Configuration
otel.exporter.otlp.endpoint=
otel.service.name=
otel.service.version=1.0.0

# Flask API Configuration
flask.api.base-url=
flask.api.timeout=30000

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.management.member.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# OTP Configuration
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=false

# Face Recognition Configuration
face.recognition.confidence.threshold=25.0

# Bearer
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

